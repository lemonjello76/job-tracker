<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Report Builder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111318;
    --surface: #1a1d26;
    --input: #242836;
    --border: #333849;
    --text: #e8eaf0;
    --dim: #8b90a0;
    --accent: #4f8cff;
    --green: #22c55e;
    --green-hover: #16a34a;
    --red: #ef4444;
    --yellow: #fbbf24;
    --radius: 8px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Header bar */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .header-btn {
    padding: 8px 16px;
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .header-btn:hover { border-color: var(--accent); }

  .main { max-width: 900px; margin: 0 auto; padding: 20px; }
  h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--dim);
    margin-bottom: 12px;
  }

  /* Sections */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  /* Form grid */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 12px;
  }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; }
  .field label {
    font-size: 13px;
    font-weight: 600;
    color: var(--dim);
    margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    padding: 10px 12px;
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 60px; }

  /* Big action buttons */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }
  .action-btn {
    padding: 18px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: center;
  }
  .action-btn:hover { border-color: var(--accent); background: var(--input); }
  .action-btn .icon { font-size: 28px; display: block; margin-bottom: 4px; }
  .action-btn-sm {
    padding: 10px 16px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-block;
    margin-bottom: 12px;
  }
  .action-btn-sm:hover { border-color: var(--accent); color: var(--text); }

  /* Photo grid */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .photo-card {
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .photo-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }
  .photo-card textarea {
    width: 100%;
    padding: 8px 10px;
    background: transparent;
    border: none;
    border-top: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 50px;
  }
  .photo-card textarea::placeholder { color: var(--dim); }
  .remove-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.7);
    color: var(--red);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Receipt cards - vertical layout */
  .receipt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }
  .receipt-card {
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .receipt-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }
  .receipt-card .r-fields { padding: 10px; }
  .receipt-card .r-fields input,
  .receipt-card .r-fields select {
    width: 100%;
    padding: 7px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    margin-bottom: 6px;
  }
  .receipt-card .r-fields input:focus,
  .receipt-card .r-fields select:focus { border-color: var(--accent); }
  .expense-total {
    padding: 14px 20px;
    background: var(--input);
    border-radius: var(--radius);
    font-size: 18px;
    font-weight: 700;
    text-align: center;
  }
  .expense-total span { color: var(--green); }

  /* Hours & mileage */
  .hours-total {
    margin-top: 14px;
    padding: 14px 20px;
    background: var(--input);
    border-radius: var(--radius);
    font-size: 18px;
    font-weight: 700;
    text-align: center;
  }
  .hours-total span { color: var(--accent); }
  .odo-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 12px;
  }
  .odo-card {
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    text-align: center;
  }
  .odo-card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
  }
  .odo-card .odo-placeholder {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--dim);
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  .odo-card .odo-placeholder:hover { color: var(--accent); }
  .odo-card .odo-info { padding: 10px; }
  .odo-card .odo-info input {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    text-align: center;
  }
  .odo-card .odo-stamp {
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
  }
  .mileage-total {
    padding: 10px 20px;
    background: var(--input);
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    margin-top: 8px;
  }
  .mileage-total span { color: var(--accent); }
  .trip-block {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
    position: relative;
  }
  .trip-block .trip-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--dim);
    margin-bottom: 8px;
  }

  /* Notes */
  .note-card {
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .note-card input {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    outline: none;
    margin-bottom: 8px;
  }
  .note-card textarea {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 80px;
  }
  .note-card input:focus, .note-card textarea:focus { border-color: var(--accent); }

  /* Job files */
  .file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
  }
  .file-row .file-icon { font-size: 22px; flex-shrink: 0; }
  .file-row .file-name { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-row .file-size { font-size: 12px; color: var(--dim); flex-shrink: 0; }
  .file-row img { width: 44px; height: 44px; object-fit: cover; border-radius: 4px; flex-shrink: 0; cursor: pointer; }

  /* Bottom buttons */
  .bottom-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }
  .generate-btn {
    width: 100%;
    padding: 22px;
    border: none;
    border-radius: var(--radius);
    background: var(--green);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.5px;
  }
  .generate-btn:hover { background: var(--green-hover); }
  .send-btn {
    width: 100%;
    padding: 22px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.5px;
  }
  .send-btn:hover { background: #6fa0ff; }

  /* Sidebar */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
  }
  .sidebar-overlay.open { display: block; }
  .sidebar {
    position: fixed;
    top: 0;
    right: -360px;
    width: 340px;
    max-width: 90vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 100;
    transition: right 0.25s ease;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar.open { right: 0; }
  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .sidebar-header h2 { margin: 0; font-size: 16px; font-weight: 700; color: var(--text); text-transform: none; letter-spacing: 0; }
  .sidebar-close {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 24px;
    cursor: pointer;
  }
  .sidebar-body { padding: 12px; flex: 1; overflow-y: auto; }
  .sidebar-item {
    padding: 12px 14px;
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .sidebar-item:hover { border-color: var(--accent); }
  .sidebar-item .si-client { font-weight: 700; font-size: 15px; }
  .sidebar-item .si-meta { font-size: 13px; color: var(--dim); margin-top: 2px; }
  .sidebar-item .si-actions { margin-top: 8px; display: flex; gap: 8px; }
  .sidebar-empty { color: var(--dim); font-size: 14px; text-align: center; padding: 40px 20px; }
  .sidebar-backup {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .sidebar-backup button {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--input);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .sidebar-backup button:hover { border-color: var(--accent); }

  /* Dialog */
  .dialog-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .dialog-overlay.open { display: flex; }
  .dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .dialog h3 { font-size: 18px; margin-bottom: 10px; }
  .dialog p { font-size: 14px; color: var(--dim); margin-bottom: 20px; }
  .dialog-btns { display: flex; gap: 10px; justify-content: center; }
  .dialog-btns button {
    padding: 12px 24px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { background: var(--green-hover); }
  .btn-dim { background: var(--input); color: var(--dim); border: 1px solid var(--border) !important; }
  .btn-dim:hover { color: var(--text); }
  .btn-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .btn-red:hover { background: rgba(239,68,68,0.25); }

  .hidden { display: none; }

  /* Prevent auto-zoom on mobile inputs */
  @media (max-width: 768px) {
    input, select, textarea { font-size: 16px !important; }
  }
  @media (max-width: 700px) {
    .main { padding: 12px; }
    .header h1 { font-size: 17px; }
    .section { padding: 14px; }
    .actions { gap: 10px; }
    .action-btn { padding: 14px 10px; font-size: 13px; }
    .action-btn .icon { font-size: 26px; }
    .form-row, .form-row.three { grid-template-columns: 1fr; }
    .photo-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .receipt-grid { grid-template-columns: 1fr; }
    .odo-pair { grid-template-columns: 1fr; }
    .generate-btn, .send-btn { padding: 16px; font-size: 16px; }
    .bottom-btns { grid-template-columns: 1fr; }
  }
  @media (max-width: 400px) {
    .actions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1><span>Mist</span>America</h1>
  <button class="header-btn" onclick="openSidebar()">Completed Jobs (<span id="completedCount">0</span>)</button>
</div>

<div class="main">

<!-- JOB INFO -->
<div class="section">
  <h2>Job Info</h2>
  <div class="form-row">
    <div class="field"><label>Client Name</label><input type="text" id="client" placeholder="Chick-fil-A #1234"></div>
    <div class="field"><label>City</label><input type="text" id="city" placeholder="Phoenix"></div>
  </div>
  <div class="form-row three">
    <div class="field"><label>State</label><input type="text" id="state" placeholder="AZ" maxlength="2" style="text-transform:uppercase"></div>
    <div class="field"><label>Date Started</label><input type="date" id="dateStart"></div>
    <div class="field"><label>Date Completed</label><input type="date" id="dateEnd"></div>
  </div>
</div>

<!-- 5 BIG BUTTONS -->
<div class="actions">
  <button class="action-btn" onclick="document.getElementById('photoInput').click()">
    <span class="icon">📷</span> UPLOAD PHOTOS
  </button>
  <button class="action-btn" onclick="toggleSection('hoursSection')">
    <span class="icon">🕐</span> HOURS &amp; MILEAGE
  </button>
  <button class="action-btn" onclick="document.getElementById('receiptInput').click()">
    <span class="icon">🧾</span> UPLOAD RECEIPTS
  </button>
  <button class="action-btn" onclick="document.getElementById('jobFileInput').click()">
    <span class="icon">📁</span> UPLOAD JOB FILES
  </button>
  <button class="action-btn" onclick="toggleSection('notesSection'); addNoteIfEmpty()" style="grid-column: 1 / -1">
    <span class="icon">📝</span> NOTES
  </button>
</div>

<!-- Hidden file inputs -->
<input type="file" id="photoInput" class="hidden" multiple accept="image/*">
<input type="file" id="receiptInput" class="hidden" multiple accept="image/*">
<input type="file" id="jobFileInput" class="hidden" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.bmp,.webp,.txt,.csv">
<input type="file" id="odoInput" class="hidden" accept="image/*">

<!-- PHOTOS -->
<div id="photosSection" class="section hidden">
  <h2>Job Photos (<span id="photoCount">0</span>)</h2>
  <button class="action-btn-sm" onclick="document.getElementById('photoInput').click()">+ Add More Photos</button>
  <div class="photo-grid" id="photoGrid"></div>
</div>

<!-- JOB FILES -->
<div id="jobFilesSection" class="section hidden">
  <h2>Job Files (<span id="jobFileCount">0</span>)</h2>
  <button class="action-btn-sm" onclick="document.getElementById('jobFileInput').click()">+ Add More Files</button>
  <div id="jobFileList"></div>
</div>

<!-- HOURS & MILEAGE -->
<div id="hoursSection" class="section hidden">
  <h2>Hours</h2>
  <div class="form-row three">
    <div class="field"><label>Hours On Site</label><input type="number" id="siteHours" min="0" step="0.5" placeholder="0" oninput="calcHours()"></div>
    <div class="field"><label>Drive Hours (to job)</label><input type="number" id="driveToHours" min="0" step="0.5" placeholder="0" oninput="calcHours()"></div>
    <div class="field"><label>Drive Hours (return)</label><input type="number" id="driveBackHours" min="0" step="0.5" placeholder="0" oninput="calcHours()"></div>
  </div>
  <div class="hours-total">Total: <span id="totalHours">0</span> hours</div>

  <h2 style="margin-top:24px">Mileage</h2>
  <div id="mileageList"></div>
  <button class="action-btn-sm" onclick="addTrip()">+ Add Trip</button>
  <div class="mileage-total" id="mileageTotalBox" style="display:none">Total Miles: <span id="totalMiles">0</span></div>
</div>

<!-- RECEIPTS -->
<div id="receiptsSection" class="section hidden">
  <h2>Receipts (<span id="receiptCount">0</span>)</h2>
  <button class="action-btn-sm" onclick="document.getElementById('receiptInput').click()">+ Add More Receipts</button>
  <div class="receipt-grid" id="receiptGrid"></div>
  <div class="expense-total">Expense Total: <span id="expenseTotal">$0.00</span></div>
</div>

<!-- NOTES -->
<div id="notesSection" class="section hidden">
  <h2>Notes</h2>
  <div id="notesList"></div>
  <button class="action-btn-sm" onclick="addNote()">+ Add Note</button>
</div>

<!-- GENERATE -->
<div class="bottom-btns">
  <button class="generate-btn" onclick="generateReport()">GENERATE REPORT</button>
  <button class="send-btn" onclick="sendReport()">SEND REPORT ✉</button>
</div>

</div><!-- /main -->

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Completed Jobs</h2>
    <button class="sidebar-close" onclick="closeSidebar()">&times;</button>
  </div>
  <div class="sidebar-backup">
    <button onclick="exportAllJobs()">📤 Backup</button>
    <button onclick="document.getElementById('importInput').click()">📥 Restore</button>
  </div>
  <div class="sidebar-body" id="sidebarBody"></div>
</div>

<!-- Hidden file input for restore -->
<input type="file" id="importInput" class="hidden" accept=".json,application/json">

<!-- Save dialog -->
<div class="dialog-overlay" id="saveDialog">
  <div class="dialog">
    <h3>Job report generated</h3>
    <p>Save this job and start a new one?</p>
    <div class="dialog-btns">
      <button class="btn-green" onclick="saveAndReset()">Save &amp; New Job</button>
      <button class="btn-dim" onclick="closeDialog()">Keep Working</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════
// STATE
// ═══════════════════════════════
let photos = [];     // { dataURL, notes }
let receipts = [];   // { dataURL, amount, vendor, category }
let jobFiles = [];   // { dataURL, fileName, size, isImage }
let notes = [];      // { title, text }
let trips = [];      // { startPhoto, startStamp, startMiles, endPhoto, endStamp, endMiles }
let db = null;
let lastReportHTML = '';

// ═══════════════════════════════
// INDEXEDDB — completed jobs
// ═══════════════════════════════
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('MistAmericaJobs', 1);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore('jobs', { keyPath: 'id' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
function dbPut(job) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('jobs', 'readwrite');
    tx.objectStore('jobs').put(job);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}
function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('jobs', 'readonly');
    const req = tx.objectStore('jobs').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = e => reject(e.target.error);
  });
}
function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('jobs', 'readonly');
    const req = tx.objectStore('jobs').get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = e => reject(e.target.error);
  });
}
function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('jobs', 'readwrite');
    tx.objectStore('jobs').delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${parseInt(m)}/${parseInt(day)}/${y}`;
}
function nowStamp() {
  const d = new Date();
  return d.toLocaleDateString('en-US') + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
function toggleSection(id) {
  document.getElementById(id).classList.toggle('hidden');
}

// Burn timestamp onto image
function stampImage(dataURL) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width;
      c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const stamp = nowStamp();
      const fs = Math.max(18, Math.floor(img.width / 22));
      ctx.font = `bold ${fs}px sans-serif`;
      const tw = ctx.measureText(stamp).width;
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, img.height - fs - 18, tw + 28, fs + 18);
      ctx.fillStyle = '#fff';
      ctx.fillText(stamp, 14, img.height - 12);
      resolve({ dataURL: c.toDataURL('image/jpeg', 0.85), stamp });
    };
    img.src = dataURL;
  });
}

let odoTarget = null; // { tripIndex, which: 'start'|'end' }

document.getElementById('odoInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file || !odoTarget) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const { dataURL, stamp } = await stampImage(ev.target.result);
    const trip = trips[odoTarget.tripIndex];
    if (odoTarget.which === 'start') {
      trip.startPhoto = dataURL;
      trip.startStamp = stamp;
    } else {
      trip.endPhoto = dataURL;
      trip.endStamp = stamp;
    }
    renderMileage();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function addTrip() {
  trips.push({ startPhoto: null, startStamp: '', startMiles: '', endPhoto: null, endStamp: '', endMiles: '' });
  renderMileage();
}

function removeTrip(i) {
  trips.splice(i, 1);
  renderMileage();
}

function uploadOdo(tripIndex, which) {
  odoTarget = { tripIndex, which };
  document.getElementById('odoInput').click();
}

function updateMiles(tripIndex, which, val) {
  trips[tripIndex][which === 'start' ? 'startMiles' : 'endMiles'] = val;
  calcMileage();
}

function calcMileage() {
  let total = 0;
  trips.forEach(t => {
    const s = parseFloat(t.startMiles) || 0;
    const e = parseFloat(t.endMiles) || 0;
    if (e > s) total += e - s;
  });
  const box = document.getElementById('mileageTotalBox');
  box.style.display = trips.length ? '' : 'none';
  document.getElementById('totalMiles').textContent = total.toLocaleString();
}

  document.getElementById('mileageList').innerHTML = trips.map((t, i) => `
    <div class="trip-block">

      </div>
      <div class="odo-pair">
        <div class="odo-card">

          <div class="odo-info">
            <input type="number" placeholder="Start miles" value="${t.startMiles}" oninput="updateMiles(${i},'start',this.value)">

            ${t.startPhoto ? `<button class="action-btn-sm" style="margin:6px 0 0;font-size:12px" onclick="uploadOdo(${i},'start')">Retake</button>` : ''}
          </div>
        </div>

  }

  html += `</body></html>`;
  lastReportHTML = html;

  // Open the report in a new tab via Blob URL (handles big reports reliably)
  try {
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, '_blank');
    if (!w) {
      // Popup blocked — fall back to downloading the file so user still gets the report
      const a = document.createElement('a');
      const safeName = (client + '_' + location).replace(/[^a-z0-9]+/gi, '_').replace(/_+/g, '_').replace(/^_|_$/g, '') || 'job_report';
      a.href = url;
      a.download = safeName + '.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      alert('Your browser blocked the popup, so the report was downloaded as an HTML file instead. Open it from your Downloads folder.');
    }
    // Release the object URL after 60s so memory isn't held forever
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  } catch (err) {
    console.error('Report generation error:', err);
    alert('Report could not open: ' + err.message);
    return;
  }

  // Show save dialog
  document.getElementById('saveDialog').classList.add('open');
}

// ═══════════════════════════════
// SEND REPORT
// ═══════════════════════════════
function sendReport() {
  // Generate the report first (opens in new tab for Ctrl+P → Save as PDF)
  generateReport();

  // Build the email subject
  const client = document.getElementById('client').value.trim() || 'N/A';
  const city = document.getElementById('city').value.trim();
  const state = document.getElementById('state').value.trim().toUpperCase();
  const dateEnd = document.getElementById('dateEnd').value;
  const location = [city, state].filter(Boolean).join(', ');
  const subject = `Job Completion Report - ${client} - ${location} - ${fmtDate(dateEnd) || 'In Progress'}`;

  // Build a plain-text summary for the email body
  const siteH = parseFloat(document.getElementById('siteHours').value) || 0;
  const driveToH = parseFloat(document.getElementById('driveToHours').value) || 0;
  const driveBackH = parseFloat(document.getElementById('driveBackHours').value) || 0;
  const totalH = siteH + driveToH + driveBackH;
  const expTotal = receipts.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
  let totalMiles = 0;
  trips.forEach(t => {
    const s = parseFloat(t.startMiles) || 0;
    const e = parseFloat(t.endMiles) || 0;
    if (e > s) totalMiles += e - s;
  });

  let body = `Job Completion Report\n`;
  body += `Client: ${client}\n`;
  body += `Location: ${location}\n`;
  body += `Dates: ${fmtDate(document.getElementById('dateStart').value) || 'N/A'}`;
  if (dateEnd) body += ` - ${fmtDate(dateEnd)}`;
  body += `\n\n`;
  if (totalH > 0) body += `Total Hours: ${totalH.toFixed(1)} (${siteH.toFixed(1)} on site, ${driveToH.toFixed(1)} drive to, ${driveBackH.toFixed(1)} drive back)\n`;
  if (totalMiles > 0) body += `Total Miles: ${totalMiles.toLocaleString()}\n`;
  if (expTotal > 0) body += `Total Expenses: $${expTotal.toFixed(2)}\n`;
  body += `\n---\nFull report with photos and receipts is attached as PDF.\n`;
  body += `(Save the report tab as PDF using Ctrl+P or Print > Save as PDF, then attach it to this email.)\n`;

  // Open mailto
  const mailto = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

// ═══════════════════════════════
// SAVE / RESET / SIDEBAR
// ═══════════════════════════════
function closeDialog() {
  document.getElementById('saveDialog').classList.remove('open');
}

async function saveAndReset() {
  closeDialog();
  const job = {
    id: Date.now(),
    client: document.getElementById('client').value.trim() || 'Untitled',
    city: document.getElementById('city').value.trim(),
    state: document.getElementById('state').value.trim().toUpperCase(),
    dateStart: document.getElementById('dateStart').value,
    dateEnd: document.getElementById('dateEnd').value,
    savedAt: new Date().toISOString(),
    reportHTML: lastReportHTML,
  };
  await dbPut(job);
  clearForm();
  await refreshSidebar();
}

function clearForm() {
  document.getElementById('client').value = '';
  document.getElementById('city').value = '';
  document.getElementById('state').value = '';
  document.getElementById('dateStart').value = '';
  document.getElementById('dateEnd').value = '';
  document.getElementById('siteHours').value = '';
  document.getElementById('driveToHours').value = '';
  document.getElementById('driveBackHours').value = '';
  document.getElementById('totalHours').textContent = '0';
  photos = []; receipts = []; jobFiles = []; notes = []; trips = [];
  lastReportHTML = '';
  renderPhotos();
  renderReceipts();
  renderJobFiles();
  renderNotes();
  renderMileage();
  document.getElementById('hoursSection').classList.add('hidden');
  document.getElementById('notesSection').classList.add('hidden');
  window.scrollTo(0, 0);
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  refreshSidebar();
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

async function refreshSidebar() {
  const jobs = await dbGetAll();
  jobs.sort((a, b) => b.id - a.id);
  document.getElementById('completedCount').textContent = jobs.length;
  const body = document.getElementById('sidebarBody');
  if (!jobs.length) {
    body.innerHTML = '<div class="sidebar-empty">No completed jobs yet.<br>Generate a report to save a job here.</div>';
    return;
  }
  body.innerHTML = jobs.map(j => {
    const loc = [j.city, j.state].filter(Boolean).join(', ');
    return `<div class="sidebar-item">
      <div class="si-client">${esc(j.client)}</div>
      <div class="si-meta">${esc(loc)}${j.dateStart ? ' — ' + fmtDate(j.dateStart) : ''}</div>
      <div class="si-actions">
        <button class="btn-green" style="padding:6px 14px;font-size:13px;border:none;border-radius:var(--radius);cursor:pointer" onclick="event.stopPropagation();viewSavedReport(${j.id})">View Report</button>
        <button class="btn-red" style="padding:6px 14px;font-size:13px;border:none;border-radius:var(--radius);cursor:pointer" onclick="event.stopPropagation();deleteSavedJob(${j.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function viewSavedReport(id) {
  const job = await dbGet(id);
  if (!job) return;
  const blob = new Blob([job.reportHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const w = window.open(url, '_blank');
  if (!w) {
    const a = document.createElement('a');
    const safeName = (job.client + '_' + (job.city || '') + '_' + (job.state || '')).replace(/[^a-z0-9]+/gi, '_').replace(/_+/g, '_').replace(/^_|_$/g, '') || 'job_report';
    a.href = url;
    a.download = safeName + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    alert('Popup blocked — report was downloaded as an HTML file instead.');
  }
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}

async function deleteSavedJob(id) {
  if (!confirm('Delete this saved job?')) return;
  await dbDelete(id);
  refreshSidebar();
}

// ═══════════════════════════════
// BACKUP & RESTORE
// ═══════════════════════════════
async function exportAllJobs() {
  const jobs = await dbGetAll();
  if (!jobs.length) {
    alert('No saved jobs to back up yet.');
    return;
  }
  const backup = {
    app: 'MistAmerica Job Tracker',
    version: 1,
    exportedAt: new Date().toISOString(),
    jobCount: jobs.length,
    jobs: jobs
  };
  const json = JSON.stringify(backup);
  const today = new Date().toISOString().slice(0, 10);
  const fileName = `mistamerica-jobs-backup-${today}.json`;
  const blob = new Blob([json], { type: 'application/json' });
  const file = new File([blob], fileName, { type: 'application/json' });

  // Try native share (lets you email/Drive/Dropbox/etc in one tap on mobile)
  try {
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'MistAmerica Jobs Backup',
        text: `Backup of ${jobs.length} job${jobs.length === 1 ? '' : 's'} — ${today}`
      });
      return;
    }
  } catch (e) {
    if (e.name === 'AbortError') return; // user cancelled share — that's fine
  }
  // Fallback: download the file
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 60000);
  alert(`Backup saved: ${fileName}\n\nEmail it to yourself or save it to Google Drive so you have a copy off your phone.`);
}

document.getElementById('importInput').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    let backup;
    try {
      backup = JSON.parse(ev.target.result);
    } catch (err) {
      alert('That file is not a valid backup file.');
      return;
    }
    if (!backup.jobs || !Array.isArray(backup.jobs)) {
      alert('That file is not a valid MistAmerica Job Tracker backup.');
      return;
    }
    const existing = await dbGetAll();
    const existingIds = new Set(existing.map(j => j.id));
    let added = 0, skipped = 0;
    for (const job of backup.jobs) {
      if (!job.id) { skipped++; continue; }
      if (existingIds.has(job.id)) { skipped++; continue; }
      await dbPut(job);
      added++;
    }
    await refreshSidebar();
    alert(`Restore complete.\n\nAdded: ${added} job${added === 1 ? '' : 's'}\nSkipped (already on this phone): ${skipped}`);
  };
  reader.readAsText(file);
});

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
(async function init() {
  try {
    db = await openDB();
    const jobs = await dbGetAll();
    document.getElementById('completedCount').textContent = jobs.length;
  } catch(e) {
    console.warn('IndexedDB unavailable:', e);
  }
})();
</script>
